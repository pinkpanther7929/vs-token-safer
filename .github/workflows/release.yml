name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create GitHub Release with categorized, concise notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then echo "release $TAG already exists"; exit 0; fi
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          RANGE="$TAG"; [ -n "$PREV" ] && RANGE="${PREV}..${TAG}"
          # We squash-merge the dev→main PR, so the per-change conventional-commit subjects live as `* …`
          # bullets in the squash commit BODY (not as separate commit subjects). `--generate-notes` only
          # showed the one PR title. Pull those subjects, group them by type, and emit ONE concise line each
          # — a Features / Bug Fixes / Maintenance changelog, not the full commit bodies. Fall back to raw
          # commit subjects if no squash bullets are present (e.g. a direct tag).
          SUBJECTS=$(git log "$RANGE" --no-merges --pretty=format:'%b' | sed -n 's/^\* //p')
          [ -z "$SUBJECTS" ] && SUBJECTS=$(git log "$RANGE" --no-merges --pretty=format:'%s')
          feat=""; fix=""; docs=""; chore=""; other=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            desc=$(printf '%s' "$line" | sed -E 's/^(feat|fix|docs|chore|ci|test|build|refactor|perf|style)(\([^)]*\))?!?: //')
            case "$line" in
              feat*) feat="${feat}- ${desc}"$'\n' ;;
              fix*) fix="${fix}- ${desc}"$'\n' ;;
              docs*) docs="${docs}- ${desc}"$'\n' ;;
              chore*|ci*|test*|build*|refactor*|perf*|style*) chore="${chore}- ${desc}"$'\n' ;;
              *) other="${other}- ${line}"$'\n' ;;
            esac
          done <<< "$SUBJECTS"
          : > notes.md
          [ -n "$feat" ]  && printf '### 🚀 Features\n%s\n' "$feat"  >> notes.md
          [ -n "$fix" ]   && printf '### 🐛 Bug Fixes\n%s\n' "$fix"  >> notes.md
          [ -n "$docs" ]  && printf '### 📝 Documentation\n%s\n' "$docs" >> notes.md
          [ -n "$chore" ] && printf '### 🔧 Maintenance\n%s\n' "$chore" >> notes.md
          [ -n "$other" ] && printf '### Other\n%s\n' "$other" >> notes.md
          [ -n "$PREV" ]  && printf '**Full Changelog**: https://github.com/%s/compare/%s...%s\n' "$GITHUB_REPOSITORY" "$PREV" "$TAG" >> notes.md
          if [ -s notes.md ]; then
            gh release create "$TAG" --notes-file notes.md --title "$TAG"
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
